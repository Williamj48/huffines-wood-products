<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wood</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>


<body>

  <nav>
    <span class="logo">Huffines Wood Products</span>
	<button class="hamburger" id="hamburger">☰</button>
	  <div class="nav-links" id="nav-links">
		<a href="Home"
   	 	   hx-get="home.html"
   	 	   hx-target="#content"
   	 	   hx-push-url="false"
   	 	   class="active">Home</a>
   	 	<a href="contact"
   	 	   hx-get="contact.html"
   	 	   hx-target="#content"
   	 	   hx-push-url="false">Contact</a>
   	 	<a href="services"
   	 	   hx-get="services.html"
   	 	   hx-target="#content"
   	 	   hx-push-url="false">Services</a>
   	 	<a href="faqs"
   	 	   hx-get="faqs.html"
   	 	   hx-target="#content"
   	 	   hx-push-url="false">FAQ's</a>
   	 	<a href="products"
   	 	   hx-get="products.html"
   	 	   hx-target="#content"
   	 	   hx-push-url="false">Products</a>
   	 	<a href="map"
   	 	   hx-get="map.html"
   	 	   hx-target="#content"
   	 	   hx-push-url="false">Map</a>


	  </div>
  </nav>

  <div id="content"
	hx-get="home.html"
	hx-trigger="load"
	hx-swap="innerHTML">

	  Hi my name is luke
  </div>

  <div id="sub-content"></div>



<script>
document.body.addEventListener('htmx:afterSwap', function(evt) {
  if (evt.detail.target.id === 'content') {
    document.getElementById('sub-content').innerHTML = '';
  }
});

document.querySelectorAll('.nav-links a').forEach(function(link) {
  link.addEventListener('click', function() {
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
    this.classList.add('active');
  });
});

const hamburger =
document.getElementById('hamburger');
const navLinks =
document.getElementById('nav-links');

hamburger.addEventListener('click', () => {
  navLinks.classList.toggle('open');
});
</script>


</body>


</html>
